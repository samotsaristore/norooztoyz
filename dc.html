<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#3B5674;
color:white;
}

header{
background:#3B5674;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid orange;
}

.logo{
display:flex;
align-items:center;
gap:15px;
font-size:22px;
font-weight:bold;
}

.logo img{
width:60px;
height:60px;
object-fit:contain;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:orange;
}

.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
font-size:48px;
color:orange;
margin-bottom:15px;
}

.hero p{
font-size:20px;
color:#dddddd;
}

.product-grid{
max-width:1200px;
margin:50px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:0 25px;
}

.product-card{
background:#4A6787;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.25);
transition:.3s;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-image{
height:260px;
background:#607D9B;
display:flex;
justify-content:center;
align-items:center;
font-size:90px;
}

.product-info{
padding:20px;
text-align:center;
}

.product-info h2{
margin-bottom:10px;
font-size:24px;
}

.price{
color:orange;
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

.status{
display:inline-block;
padding:8px 18px;
background:green;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

footer{
margin-top:80px;
padding:30px;
text-align:center;
background:#111;
}

@media(max-width:768px){

header{
flex-direction:column;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:15px;
}

nav a{
margin:8px;
}

.hero h1{
font-size:34px;
}

.hero p{
font-size:18px;
}

}

</style>

</head>
