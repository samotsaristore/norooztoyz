<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norooz Toyz</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#3B5674;
            color:white;
        }

        header{

            background:#3B5674;

            padding:20px 60px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            border-bottom:3px solid orange;

        }

        .logo{
            display:flex;

            align-items:center;

            gap:15px;

            color:white;

            font-size:30px;

            font-weight:bold;

        }

        nav a{

            color:white;

            text-decoration:none;

            margin-left:25px;

            transition:.3s;

        }

        nav a:hover{

            color:orange;

        }

        .hero{

            text-align:center;

            padding:120px 20px;

        }

        .hero h1{

            font-size:60px;

            color:orange;

        }

        .hero p{

            margin-top:20px;

            font-size:22px;

            color:#cccccc;

        }

        .button{

            display:inline-block;

            margin-top:40px;

            background:orange;

            color:black;

            text-decoration:none;

            padding:15px 40px;

            border-radius:8px;

            font-weight:bold;

        }

        footer{

            text-align:center;

            padding:30px;

            background:#111;

            margin-top:100px;

            border-top:1px solid #333;

        }
.logo img{

    width:100px !important;

    height:100px !important;

    object-fit:contain;

}

    </style>

</head>

<body>

<header>

<div class="logo">

<a href="https://www.lazada.com.ph/shop/samotsaristore" target="_blank">🛍️ Lazada</a>

<a href="https://www.facebook.com/norooz.toyz" target="_blank">📘 Facebook</a>

</nav>

</header>

<h1>Welcome to Norooz Toyz</h1>

</p>
