<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Norooz Toyz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#3B5674;
    color:white;
}

header{
    background:#3B5674;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid orange;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    color:white;
    font-size:22px;
    font-weight:bold;
}

.logo img{
    width:60px !important;
    height:60px !important;
    object-fit:contain;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:orange;
}

.hero{
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:60px;
    color:orange;
}

.hero p{
    margin-top:20px;
    font-size:22px;
    color:#cccccc;
}

.button{
    display:inline-block;
    margin-top:40px;
    background:orange;
    color:black;
    text-decoration:none;
    padding:15px 40px;
    border-radius:8px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    background:#111;
    margin-top:100px;
    border-top:1px solid #333;
}


/* ABOUT */

#about{

padding:80px 40px;

background:#45627F;

text-align:center;

}

#about h2{

font-size:42px;

color:orange;

margin-bottom:30px;

}

#about p{

max-width:900px;

margin:20px auto;

font-size:20px;

line-height:1.8;

}


/* MOBILE */

@media (max-width:768px){

header{

flex-direction:column;

padding:10px;

}

.logo{

flex-direction:column;

text-align:center;

}

.logo img{

width:55px !important;

height:55px !important;

}

nav{

display:flex;

flex-wrap:wrap;

justify-content:center;

margin-top:15px;

}

nav a{

margin:6px 8px;

font-size:16px;

}

.hero{

padding:40px 20px;

}

.hero h1{

font-size:30px;

line-height:1.2;

}

.hero p{

font-size:18px;

}

.button{

width:260px;

text-align:center;

}

}

</style>

</head>
