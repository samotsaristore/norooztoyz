<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norooz Toyz</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#290355;
            color:white;
        }

        header{

            background:#111;

            padding:20px 60px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            border-bottom:3px solid orange;

        }

        .logo{

            color:white;

            font-size:30px;

            font-weight:bold;

        }

        nav a{

            color:white;

            text-decoration:none;

            margin-left:25px;

            transition:.3s;

        }

        nav a:hover{

            color:orange;

        }

        .hero{

            text-align:center;

            padding:120px 20px;

        }

        .hero h1{

            font-size:60px;

            color:orange;

        }

        .hero p{

            margin-top:20px;

            font-size:22px;

            color:#cccccc;

        }

        .button{

            display:inline-block;

            margin-top:40px;

            background:orange;

            color:black;

            text-decoration:none;

            padding:15px 40px;

            border-radius:8px;

            font-weight:bold;

        }

        footer{

            text-align:center;

            padding:30px;

            background:#111;

            margin-top:100px;

            border-top:1px solid #333;

        }

    </style>

</head>

<body>

<header>

<div class="logo">

NOROOZ TOYZ

</div>

<nav>

<a href="#">Home</a>

<a href="#">Shop</a>

<a href="#">About</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Welcome to Norooz Toyz</h1>

<p>Your One-Stop Shop for Affordable Toys, Electronic Gadgets, Apparels, and More.
</p>

<a class="button" href="#">COMING SOON</a>

</section>

<footer>

© 2021 Norooz Toyz

</footer>

</body>

</html>
